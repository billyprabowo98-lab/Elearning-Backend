  /materi:
    get:
      summary: List Materi Pembelajaran (Semua Role)
      description: |
        Menampilkan daftar semua materi pembelajaran dengan filter tipe & mata pelajaran.
        * **Guru:** Hanya melihat materi yang diunggah oleh dirinya sendiri.
        * **Siswa/Admin:** Melihat semua materi di sistem.
      parameters:
        - name: search
          in: query
          description: Cari berdasarkan judul materi
          required: false
          schema:
            type: string
        - name: tipe
          in: query
          description: Filter berdasarkan tipe file materi
          required: false
          schema:
            type: string
            enum: [pdf, gambar, video]
        - name: mapel_id
          in: query
          description: Filter berdasarkan ID mata pelajaran
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Jumlah materi per halaman
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List materi berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Materi'
                  meta:
                    type: object
                    properties:
                      current_page: { type: integer }
                      per_page: { type: integer }
                      total: { type: integer }
                      last_page: { type: integer }
        '401':
          $ref: '#/components/responses/401Unauthenticated'

    post:
      summary: Buat Materi Baru (Admin, Guru Only)
      description: |
        Membuat materi pembelajaran baru.
        * Jika tipe `pdf` atau `gambar`, unggah file menggunakan format data `multipart/form-data`.
        * Jika tipe `video`, kirimkan URL tautan video (`link_video`).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - judul
                - tipe
                - mapel_id
              properties:
                judul:
                  type: string
                  example: Teorema Pythagoras Dasar
                deskripsi:
                  type: string
                  example: Materi pengenalan dasar rumus pythagoras segitiga siku-siku.
                tipe:
                  type: string
                  enum: [pdf, gambar, video]
                  example: pdf
                mapel_id:
                  type: integer
                  description: ID mata pelajaran
                  example: 1
                file:
                  type: string
                  format: binary
                  description: File materi (Wajib jika tipe pdf/gambar. Maks 20 MB. Ekstensi pdf, jpg, jpeg, png, webp).
                link_video:
                  type: string
                  format: uri
                  description: Tautan video (Wajib jika tipe video).
                  example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
      responses:
        '201':
          description: Materi berhasil dibuat.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Materi berhasil dibuat.
                  data:
                    $ref: '#/components/schemas/Materi'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

