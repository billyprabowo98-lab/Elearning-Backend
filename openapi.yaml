openapi: 3.0.0
info:
  title: E-Learning API Documentation
  description: |
    Dokumentasi RESTful API untuk Sistem E-Learning berbasis Laravel 12.
    
    ### Fitur Utama:
    * **Autentikasi:** Laravel Sanctum (Token-Based).
    * **RBAC (Role-Based Access Control):** admin, guru, siswa.
    * **Manajemen Akademik:** Kelas & Mata Pelajaran.
    * **Materi Pembelajaran:** Upload berkas (PDF/Gambar) dan Tautan Video.
    * **Forum Diskusi:** Pembuatan topik, komentar, dan balasan komentar bertingkat.
    * **Pengumuman:** Pengumuman sekolah & pengumuman spesifik per kelas.
    * **Notifikasi:** Notifikasi real-time untuk topik baru, komentar baru, dan balasan komentar.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Development Server Lokal

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Cek Status API
      description: Memeriksa apakah API backend E-Learning berjalan dengan baik.
      security: []
      responses:
        '200':
          description: API berjalan normal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: E-Learning Backend API is running successfully
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-06-24T19:04:21+07:00"

  /register:
    post:
      summary: Registrasi Siswa Baru
      description: Mendaftarkan akun siswa baru ke dalam sistem. Username akan di-generate otomatis dari email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  description: Nama lengkap siswa.
                  example: Muhammad Ahlul
                email:
                  type: string
                  format: email
                  description: Alamat email unik siswa.
                  example: ahlul@sekolah.sch.id
                password:
                  type: string
                  format: password
                  description: Password minimal 6 karakter.
                  example: ahlul123
                password_confirmation:
                  type: string
                  format: password
                  description: Konfirmasi password harus cocok dengan password.
                  example: ahlul123
      responses:
        '201':
          description: Registrasi berhasil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registrasi berhasil.
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|laravel_sanctum_token_string...
                      token_type:
                        type: string
                        example: Bearer
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 10
                          nama:
                            type: string
                            example: Muhammad Ahlul
                          username:
                            type: string
                            example: m_ahlul
                          email:
                            type: string
                            format: email
                            example: ahlul@sekolah.sch.id
                          role:
                            type: string
                            example: siswa
        '422':
          description: Validasi gagal (email sudah terdaftar, password kurang dari 6 karakter, atau konfirmasi password tidak cocok).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /login:
    post:
      summary: Login Pengguna
      description: Masuk menggunakan username atau email dan password untuk mendapatkan token autentikasi.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
              properties:
                login:
                  type: string
                  description: Username atau alamat email pengguna.
                  example: admin@sekolah.sch.id
                password:
                  type: string
                  format: password
                  description: Password minimal 6 karakter.
                  example: admin123
      responses:
        '200':
          description: Login berhasil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login berhasil.
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|laravel_sanctum_token_string...
                      token_type:
                        type: string
                        example: Bearer
                      user:
                        $ref: '#/components/schemas/User'
        '422':
          description: Validasi gagal (kredensial salah atau parameter kurang).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /logout:
    post:
      summary: Logout Pengguna
      description: Menghapus token autentikasi yang sedang digunakan saat ini.
      responses:
        '200':
          description: Logout berhasil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logout berhasil.
        '401':
          $ref: '#/components/responses/401Unauthenticated'

  /profile:
    get:
      summary: Detail Profil Pengguna
      description: Mendapatkan data profil lengkap dari pengguna yang sedang login.
      responses:
        '200':
          description: Profil berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthenticated'

    put:
      summary: Update Profil Pengguna
      description: Memperbarui data profil pengguna yang sedang login (Nama, Username, Email, dan Password).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nama
                - username
                - email
              properties:
                nama:
                  type: string
                  example: Siti Rahayu
                username:
                  type: string
                  example: siti_r
                email:
                  type: string
                  format: email
                  example: siti@sekolah.sch.id
                password:
                  type: string
                  format: password
                  description: Opsional, diisi jika ingin mengganti kata sandi. Minimal 6 karakter.
                  example: newpassword123
      responses:
        '200':
          description: Profil berhasil diperbarui.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Profil berhasil diperbarui.
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '422':
          description: Validasi gagal (misal email/username sudah digunakan).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /admin:
    get:
      summary: List Pengguna (Admin Only)
      description: Menampilkan daftar semua pengguna dengan filter, search, dan pagination.
      parameters:
        - name: search
          in: query
          description: Mencari berdasarkan nama pengguna (LIKE)
          required: false
          schema:
            type: string
        - name: role
          in: query
          description: Memfilter pengguna berdasarkan role
          required: false
          schema:
            type: string
            enum: [admin, guru, siswa]
        - name: per_page
          in: query
          description: Jumlah item per halaman (default 10, max 100)
          required: false
          schema:
            type: integer
            default: 10
        - name: page
          in: query
          description: Nomor halaman pagination
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Berhasil mengambil data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'

    post:
      summary: Tambah Pengguna Baru (Admin Only)
      description: Membuat akun baru (admin, guru, atau siswa).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nama
                - username
                - email
                - password
                - role
              properties:
                nama:
                  type: string
                  example: Ahmad Fauzi
                username:
                  type: string
                  description: Hanya boleh berisi huruf, angka, strip, dan underscore.
                  example: ahmad_f
                email:
                  type: string
                  format: email
                  example: ahmad.fauzi@sekolah.sch.id
                password:
                  type: string
                  format: password
                  description: Minimal 6 karakter, wajib mengandung kombinasi huruf dan angka.
                  example: ahmad123
                role:
                  type: string
                  enum: [admin, guru, siswa]
                  example: siswa
      responses:
        '201':
          description: Pengguna berhasil dibuat.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pengguna berhasil dibuat.
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          description: Validasi gagal (misal email/username duplikat).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /admin/{id}:
    get:
      summary: Detail Pengguna (Admin Only)
      description: Mengambil data detail satu pengguna berdasarkan ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Pengguna
      responses:
        '200':
          description: Detail user berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

    put:
      summary: Update Data Pengguna (Admin Only)
      description: Memperbarui data pengguna secara parsial (field yang kosong tidak akan dirubah).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Pengguna
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama:
                  type: string
                  example: Ahmad Fauzi S.Pd.
                username:
                  type: string
                  example: ahmad_f
                email:
                  type: string
                  format: email
                  example: ahmad.fauzi@sekolah.sch.id
                password:
                  type: string
                  format: password
                  description: Opsional, diisi jika ingin mengganti password.
                  example: ahmadNew123
                role:
                  type: string
                  enum: [admin, guru, siswa]
                  example: guru
      responses:
        '200':
          description: Pengguna berhasil diperbarui.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pengguna berhasil diperbarui.
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Hapus Pengguna (Admin Only)
      description: Menghapus pengguna dari sistem. Admin tidak dapat menghapus akunnya sendiri.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Pengguna yang ingin dihapus
      responses:
        '200':
          description: Pengguna berhasil dihapus.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pengguna berhasil dihapus.
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          description: Gagal menghapus karena menghapus akun sendiri.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Tidak dapat menghapus akun sendiri.

  /kelas:
    get:
      summary: List Kelas (Semua Role)
      description: Menampilkan daftar kelas dengan pagination, pencarian nama, filter tahun ajaran, dan tingkat kelas. Siswa hanya melihat kelas yang diikutinya, Guru hanya melihat kelas yang diajarnya, Admin melihat semua kelas.
      parameters:
        - name: search
          in: query
          description: Cari berdasarkan nama_kelas
          required: false
          schema:
            type: string
        - name: tahun_ajaran
          in: query
          description: Filter berdasarkan tahun ajaran (format YYYY)
          required: false
          schema:
            type: integer
        - name: tingkat
          in: query
          description: Filter tingkat kelas
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          description: Jumlah item per halaman (default 10)
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List kelas berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Kelas'
                  meta:
                    type: object
                    properties:
                      current_page: { type: integer, example: 1 }
                      per_page: { type: integer, example: 10 }
                      total: { type: integer, example: 5 }
                      last_page: { type: integer, example: 1 }
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'

    post:
      summary: Buat Kelas Baru (Admin, Guru Only)
      description: Menambahkan kelas baru. Wali kelas harus berupa user dengan role 'guru'.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nama_kelas
                - tingkat
                - tahun_ajaran
              properties:
                nama_kelas:
                  type: string
                  example: X MIPA 1
                tingkat:
                  type: string
                  example: X
                jurusan:
                  type: string
                  example: MIPA
                guru_id:
                  type: integer
                  description: ID guru wali kelas (role harus 'guru').
                  example: 2
                tahun_ajaran:
                  type: integer
                  description: Tahun ajaran 4 digit.
                  example: 2024
      responses:
        '201':
          description: Kelas berhasil dibuat.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Kelas berhasil dibuat.
                  data:
                    $ref: '#/components/schemas/Kelas'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          description: Validasi gagal (misalnya wali kelas bukan guru).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /kelas/{id}:
    put:
      summary: Update Kelas (Admin, Guru Only)
      description: Memperbarui informasi data kelas.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Kelas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama_kelas:
                  type: string
                  example: X MIPA 1 (Unggulan)
                tingkat:
                  type: string
                  example: X
                jurusan:
                  type: string
                  example: MIPA
                guru_id:
                  type: integer
                  example: 2
                tahun_ajaran:
                  type: integer
                  example: 2024
      responses:
        '200':
          description: Kelas berhasil diperbarui.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Kelas berhasil diperbarui.
                  data:
                    $ref: '#/components/schemas/Kelas'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Hapus Kelas (Admin, Guru Only)
      description: Menghapus kelas secara permanen beserta data relasi siswanya.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Kelas
      responses:
        '200':
          description: Kelas berhasil dihapus.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Kelas berhasil dihapus.
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /kelas/{id}/siswa:
    post:
      summary: Tambah Siswa ke Kelas (Admin, Guru Only)
      description: Memasukkan satu atau beberapa siswa sekaligus ke kelas pada tahun ajaran yang ditentukan.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Kelas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - siswa_ids
                - tahun_ajaran
              properties:
                siswa_ids:
                  type: array
                  items:
                    type: integer
                  description: Array ID User yang bertipe siswa.
                  example: [3, 4]
                tahun_ajaran:
                  type: integer
                  example: 2024
      responses:
        '201':
          description: Siswa berhasil ditambahkan.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 2 siswa berhasil ditambahkan ke kelas.
                  data:
                    $ref: '#/components/schemas/Kelas'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          description: Gagal karena ada ID bukan siswa atau siswa telah terdaftar di kelas lain pada tahun ajaran tersebut.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /kelas/{id}/siswa/{id_siswa}:
    delete:
      summary: Hapus Siswa dari Kelas (Admin, Guru Only)
      description: Mengeluarkan satu siswa dari daftar siswa kelas.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Kelas
        - name: id_siswa
          in: path
          required: true
          schema:
            type: integer
          description: ID Siswa (User ID)
      responses:
        '200':
          description: Siswa berhasil dikeluarkan dari kelas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Siswa berhasil dikeluarkan dari kelas.
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          description: Kelas tidak ditemukan atau siswa tidak terdaftar di kelas ini.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Siswa tidak terdaftar di kelas ini.

  /kelas/join:
    post:
      summary: Gabung Kelas (Siswa Only)
      description: Siswa bergabung ke kelas menggunakan kode kelas (kelas_id).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - kelas_id
              properties:
                kelas_id:
                  type: integer
                  description: ID kelas yang ingin diikuti.
                  example: 1
      responses:
        '200':
          description: Berhasil bergabung ke kelas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Berhasil bergabung ke kelas.
                  data:
                    $ref: '#/components/schemas/Kelas'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          description: Kelas tidak ditemukan.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Kelas tidak ditemukan. Periksa kembali kode kelas.
        '422':
          description: Sudah terdaftar di kelas ini.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Anda sudah terdaftar di kelas ini.

  /mapel:
    get:
      summary: List Mata Pelajaran (Semua Role)
      description: Mengambil daftar mata pelajaran dengan pagination dan pencarian nama/kode. Dapat diakses oleh Admin, Guru, dan Siswa.
      parameters:
        - name: search
          in: query
          description: Cari berdasarkan nama_mapel atau kode_mapel
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          description: Jumlah item per halaman
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Berhasil mengambil data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mapel'
                  meta:
                    type: object
                    properties:
                      current_page: { type: integer }
                      per_page: { type: integer }
                      total: { type: integer }
                      last_page: { type: integer }
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'

    post:
      summary: Buat Mata Pelajaran (Admin, Guru Only)
      description: Menambahkan data mata pelajaran baru.
      requestBody:
        required: true
        content:
