            schema:
              type: object
              required:
                - konten
              properties:
                konten:
                  type: string
                  description: Isi komentar minimal 2 karakter.
                  example: Coba cek spasi tab-nya, di Python wajib 4 spasi atau konsisten satu tab.
                parent_id:
                  type: integer
                  nullable: true
                  description: ID komentar utama yang ingin dibalas (diisi hanya jika membalas komentar).
                  example: 1
      responses:
        '201':
          description: Komentar / balasan berhasil disimpan.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Komentar berhasil ditambahkan.
                  data:
                    $ref: '#/components/schemas/Komentar'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          description: Gagal karena topik sudah ditutup atau komentar parent tidak ditemukan dalam topik ini.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /komentar/{id}:
    put:
      summary: Edit Komentar (Semua Role)
      description: Mengedit teks komentar yang sudah ditulis. Hanya dapat dilakukan oleh pemilik komentar tersebut.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Komentar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - konten
              properties:
                konten:
                  type: string
                  example: Revisi komentar, pastikan cek indentation setting di VSCode.
      responses:
        '200':
          description: Komentar berhasil diperbarui.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Komentar berhasil diperbarui.
                  data:
                    $ref: '#/components/schemas/Komentar'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

    delete:
      summary: Hapus Komentar (Semua Role)
      description: Menghapus komentar. Dapat dilakukan oleh pemilik komentar atau admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Komentar
      responses:
        '200':
          description: Komentar berhasil dihapus.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Komentar berhasil dihapus.
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /notifikasi:
    get:
      summary: List Notifikasi Pengguna (Semua Role)
      description: Menampilkan daftar notifikasi yang ditujukan untuk user yang sedang login saat ini.
      parameters:
        - name: belum_dibaca
          in: query
          description: Kirimkan 1 jika ingin menyaring hanya notifikasi yang belum dibaca.
          required: false
          schema:
            type: boolean
        - name: per_page
          in: query
          description: Jumlah item per halaman (default 15)
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Notifikasi berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  jumlah_belum_dibaca:
                    type: integer
                    example: 3
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notifikasi'
                  meta:
                    type: object
                    properties:
                      current_page: { type: integer }
                      per_page: { type: integer }
                      total: { type: integer }
                      last_page: { type: integer }
        '401':
          $ref: '#/components/responses/401Unauthenticated'

  /notifikasi/baca-semua:
    put:
      summary: Tandai Semua Notifikasi Sudah Dibaca (Semua Role)
      description: Menandai seluruh notifikasi user yang sedang login menjadi sudah dibaca sekaligus.
      responses:
        '200':
          description: Berhasil menandai.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 3 notifikasi ditandai sudah dibaca.
        '401':
          $ref: '#/components/responses/401Unauthenticated'

  /notifikasi/{id}/baca:
    put:
      summary: Tandai Satu Notifikasi Sudah Dibaca (Semua Role)
      description: Menandai satu notifikasi spesifik sebagai sudah dibaca.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Notifikasi
      responses:
        '200':
          description: Berhasil diperbarui.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notifikasi ditandai sudah dibaca.
                  data:
                    $ref: '#/components/schemas/Notifikasi'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '404':
          $ref: '#/components/responses/404NotFound'

  /notifikasi/{id}:
    delete:
      summary: Hapus Notifikasi (Semua Role)
      description: Menghapus satu notifikasi milik pengguna.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Notifikasi
      responses:
        '200':
          description: Notifikasi berhasil dihapus.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notifikasi berhasil dihapus.
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '404':
          $ref: '#/components/responses/404NotFound'

  /pengumuman:
    get:
      summary: List Pengumuman (Semua Role)
      description: |
        Menampilkan pengumuman di sistem.
        * **Admin / Guru:** Melihat seluruh pengumuman sekolah, serta dapat menyaring pengumuman berdasarkan kelas.
        * **Siswa:** Mengambil pengumuman khusus untuk kelas dirinya saat ini (berdasarkan kelas tahun ajaran terbaru) dan pengumuman global (untuk semua kelas / kelas_id null).
      parameters:
        - name: search
          in: query
          description: Cari berdasarkan judul pengumuman
          required: false
          schema:
            type: string
        - name: kelas_id
          in: query
          description: Filter pengumuman per kelas (Hanya berlaku untuk Admin & Guru)
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Jumlah item per halaman
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Pengumuman berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pengumuman'
                  meta:
                    type: object
                    properties:
                      current_page: { type: integer }
                      per_page: { type: integer }
                      total: { type: integer }
                      last_page: { type: integer }
        '401':
          $ref: '#/components/responses/401Unauthenticated'

    post:
      summary: Buat Pengumuman Baru (Admin, Guru Only)
      description: Membuat pengumuman baru. Jika `kelas_id` dikirimkan bernilai `null` atau tidak dikirim, pengumuman akan bersifat global untuk semua kelas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - judul
                - isi
              properties:
                judul:
                  type: string
                  example: Upacara Hari Kemerdekaan 17 Agustus
                isi:
                  type: string
                  description: Isi pengumuman minimal 5 karakter.
                  example: Diharapkan seluruh siswa hadir pukul 07:00 WIB menggunakan pakaian seragam lengkap.
                kelas_id:
                  type: integer
                  nullable: true
                  description: ID kelas tujuan (opsional, jika kosong = untuk semua kelas).
                  example: null
      responses:
        '201':
          description: Pengumuman berhasil dibuat.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pengumuman berhasil dibuat.
                  data:
                    $ref: '#/components/schemas/Pengumuman'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /pengumuman/{id}:
    put:
      summary: Update Pengumuman (Admin, Guru Only)
      description: Mengedit isi pengumuman. Hanya dapat dilakukan oleh admin atau guru pembuat pengumuman tersebut.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Pengumuman
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                judul:
                  type: string
                  example: Upacara Hari Kemerdekaan (Revisi Waktu)
                isi:
                  type: string
                  example: Diharapkan seluruh siswa hadir pukul 06:45 WIB menggunakan pakaian seragam lengkap dan topi.
                kelas_id:
                  type: integer
                  nullable: true
                  example: null
      responses:
        '200':
          description: Pengumuman berhasil diperbarui.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pengumuman berhasil diperbarui.
                  data:
                    $ref: '#/components/schemas/Pengumuman'
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Hapus Pengumuman (Admin, Guru Only)
      description: Menghapus pengumuman dari sistem. Hanya dapat dilakukan oleh admin atau guru pembuat pengumuman tersebut.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID Pengumuman
      responses:
        '200':
          description: Pengumuman berhasil dihapus.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pengumuman berhasil dihapus.
        '401':
          $ref: '#/components/responses/401Unauthenticated'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Masukkan access token (plainTextToken) yang didapatkan saat login sukses.

  responses:
    401Unauthenticated:
      description: Pengguna belum login atau token tidak valid.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Unauthenticated. Silakan login terlebih dahulu.
    403Forbidden:
      description: Hak akses ditolak karena role tidak sesuai.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Akses ditolak. Anda tidak memiliki izin untuk mengakses resource ini.
              required_roles:
                type: array
                items:
                  type: string
                example: ["admin"]
              your_role:
                type: string
                example: siswa
    404NotFound:
      description: Resource / Data tidak ditemukan.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Data tidak ditemukan.

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nama:
          type: string
          example: Administrator
        username:
          type: string
          example: admin
        email:
          type: string
          format: email
          example: admin@sekolah.sch.id
        role:
          type: string
          enum: [admin, guru, siswa]
          example: admin
        created_at:
          type: string
          format: date-time
          example: "2026-06-24T10:30:00.000000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-06-24T10:30:00.000000Z"

    Kelas:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nama_kelas:
          type: string
          example: X MIPA 1
        tingkat:
          type: string
          example: X
        jurusan:
          type: string
          example: MIPA
        tahun_ajaran:
          type: integer
          example: 2024
        guru:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 2 }
            nama: { type: string, example: Budi Santoso }
            role: { type: string, example: guru }
        siswa:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 3 }
              nama: { type: string, example: Siti Rahayu }
              role: { type: string, example: siswa }
              pivot:
                type: object
                properties:
                  kelas_id: { type: integer, example: 1 }
                  siswa_id: { type: integer, example: 3 }
                  tahun_ajaran: { type: integer, example: 2024 }

    Mapel:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nama_mapel:
          type: string
          example: Matematika Wajib
        kode_mapel:
          type: string
          example: MTK-WJB
        deskripsi:
          type: string
          example: Pelajaran matematika dasar SMA
        jam_per_minggu:
          type: integer
          example: 4

    Materi:
      type: object
      properties:
        id:
          type: integer
          example: 1
        judul:
          type: string
          example: Teorema Pythagoras
        deskripsi:
          type: string
          example: Deskripsi materi pythagoras
        tipe:
          type: string
          enum: [pdf, gambar, video]
          example: pdf
        file_path:
          type: string
          nullable: true
          example: materi/pdf/uuid-file.pdf
        file_url:
          type: string
          nullable: true
          example: http://localhost:8000/storage/materi/pdf/uuid-file.pdf
        file_original_name:
          type: string
          nullable: true
          example: pythagoras_kelas_x.pdf
        file_size:
          type: integer
          nullable: true
          example: 2048576
        link_video:
          type: string
          nullable: true
          example: null
        mapel:
          type: object
          properties:
            id: { type: integer, example: 1 }
            nama_mapel: { type: string, example: Matematika Wajib }
        guru:
          type: object
          properties:
            id: { type: integer, example: 2 }
            nama: { type: string, example: Budi Santoso }

    ForumTopik:
      type: object
      properties:
        id:
          type: integer
          example: 1
        judul:
          type: string
          example: Diskusi Matematika Pythagoras
        konten:
          type: string
          example: Ini isi konten forum diskusi...
        status:
          type: string
          enum: [aktif, ditutup]
          example: aktif
        views:
          type: integer
          example: 10
        komentar_count:
          type: integer
          example: 3
        created_at:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id: { type: integer, example: 3 }
            nama: { type: string, example: Siti Rahayu }
            role: { type: string, example: siswa }
        mapel:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            nama_mapel: { type: string, example: Matematika Wajib }

    ForumTopikDetail:
      allOf:
        - $ref: '#/components/schemas/ForumTopik'
        - type: object
          properties:
            komentar_utama:
              type: array
              items:
                $ref: '#/components/schemas/KomentarUtama'

    KomentarUtama:
      allOf:
        - $ref: '#/components/schemas/Komentar'
        - type: object
          properties:
            balasan:
              type: array
              items:
                $ref: '#/components/schemas/Komentar'

    Komentar:
      type: object
      properties:
        id:
          type: integer
          example: 1
        konten:
          type: string
          example: Ini adalah komentar/balasan
        forum_topik_id:
          type: integer
          example: 1
        parent_id:
          type: integer
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id: { type: integer, example: 2 }
            nama: { type: string, example: Budi Santoso }
            role: { type: string, example: guru }

    Notifikasi:
      type: object
      properties:
        id:
          type: integer
          example: 1
        judul:
          type: string
          example: Komentar Baru di Topik Anda
        pesan:
          type: string
          example: Budi Santoso mengomentari topik "Diskusi Matematika Pythagoras"
        tipe:
          type: string
          example: komentar_baru
        dibaca_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
        notifiable_type:
          type: string
          example: App\Models\Komentar
        notifiable_id:
          type: integer
          example: 1

    Pengumuman:
      type: object
      properties:
        id:
          type: integer
          example: 1
        judul:
          type: string
          example: Pengumuman Pembagian Rapor
        isi:
          type: string
          example: Pembagian rapor semester genap akan dilaksanakan pada...
        created_at:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id: { type: integer, example: 1 }
            nama: { type: string, example: Administrator }
            role: { type: string, example: admin }
        kelas:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            nama_kelas: { type: string, example: X MIPA 1 }
            tingkat: { type: string, example: X }

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: Data yang dikirim tidak valid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - "Email wajib diisi."
              - "Format email tidak valid."

    PaginationLinks:
      type: object
      properties:
        first: { type: string, example: "http://localhost:8000/api/admin?page=1" }
        last: { type: string, example: "http://localhost:8000/api/admin?page=5" }
        prev: { type: string, nullable: true, example: null }
        next: { type: string, nullable: true, example: "http://localhost:8000/api/admin?page=2" }

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer, example: 1 }
        from: { type: integer, example: 1 }
        last_page: { type: integer, example: 5 }
        links:
          type: array
          items:
            type: object
            properties:
              url: { type: string, nullable: true }
              label: { type: string }
              active: { type: boolean }
        path: { type: string, example: "http://localhost:8000/api/admin" }
        per_page: { type: integer, example: 10 }
        to: { type: integer, example: 10 }
        total: { type: integer, example: 50 }

    Tugas:
      type: object
      properties:
        id:
          type: integer
          example: 1
        judul:
          type: string
          example: Tugas Matematika Aljabar
        deskripsi:
          type: string
          nullable: true
          example: Selesaikan soal aljabar halaman 45.
        deadline:
          type: string
          format: date-time
          example: "2026-06-30T23:59:59.000000Z"
        attachment_path:
          type: string
          nullable: true
          example: tugas/uuid-file.pdf
        attachment_name:
          type: string
          nullable: true
          example: aljabar_dasar.pdf
        kelas_id:
          type: integer
          example: 1
        guru_id:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        kelas:
          $ref: '#/components/schemas/Kelas'
        guru:
          type: object
          properties:
            id: { type: integer, example: 2 }
            nama: { type: string, example: Budi Santoso }
            role: { type: string, example: guru }
        pengumpulan:
          type: array
          items:
            $ref: '#/components/schemas/PengumpulanTugas'

    PengumpulanTugas:
      type: object
      properties:
        id:
          type: integer
          nullable: true
          example: 1
        tugas_id:
          type: integer
          example: 1
        siswa_id:
          type: integer
          example: 3
        file_path:
          type: string
          nullable: true
          example: pengumpulan/uuid-jawaban.pdf
        file_name:
          type: string
          nullable: true
          example: jawaban_aljabar_siti.pdf
        nilai:
          type: integer
          nullable: true
          example: 85
        catatan_guru:
          type: string
          nullable: true
          example: Jawaban sudah tepat, pertahankan!
        dikumpul_pada:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-25T10:00:00.000000Z"
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        siswa:
          type: object
          properties:
            id: { type: integer, example: 3 }
            nama: { type: string, example: Siti Rahayu }
            email: { type: string, format: email, example: siti@sekolah.sch.id }
